<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Form 1</title>
    <link rel="stylesheet" href="../css/webform1.css">
    <link rel="icon" href="../images/favicon/favicon-16x16.png">
</head>
<body>
<form method="post" action="#">
    <div id="container">

        <div>
            <label>Email Address</label>
            <input type="email" placeholder="Enter email">
            <p>We'll never share your email with anyone else</p>
        </div>

        <div>
            <label>Password</label>
            <input type="password" required placeholder="Password"
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{10,}$"
                   title="Password should have atleast 10 characters in length and contain at least one number and one
             uppercase and lowercase letter">
        </div>

        <div>
            <label>Website URL</label>
            <input type="text" placeholder="Website URL" pattern="https?://.+"
                   title="Should start https:// or http://" required>
            <p>We'll never share your email with anyone else</p>
        </div>

        <div>
            <span id="check">
                <label>
<input type="checkbox">
Check me out
                </label>
            </span>
        </div>

        <div>
            <button type="submit" id="submitButton">Submit</button>
        </div>
    </div>
</form>

</body>
</html>
