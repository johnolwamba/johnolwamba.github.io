<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Form 2</title>
    <link rel="stylesheet" href="../css/webform2.css">
    <link rel="icon" href="../images/favicon/favicon-16x16.png">
</head>
<body>

<div>
    <header>
        MUM Golden Dome Market::: SRM System

        <ul>
            <li>Products</li>
            <li>Suppliers</li>
        </ul>

        <label>Hello!</label>
        <button>Sign Out</button>
    </header>

    <div id="container">
        <h3>New Product Form</h3>

        <div id="grid-container">
            <div>
                <label>Product Number</label>
                <input type="text" name="product_number">
            </div>

            <div>
                <label>Name</label>
                <input type="text" name="name">
            </div>

            <div>
                <label>Unit Price</label>
                <input type="number" name="unit_price">
            </div>

            <div>
                <label>Quantity In Stock</label>
                <input type="number" name="quantity">
            </div>

            <div>
                <label>Supplier:</label>
                <select>
                    <option>Select a supplier</option>
                </select>
            </div>

            <div>
                <label>Date Supplied</label>
                <input type="date" name="date">
                <p>Enter a valid date</p>
            </div>

            <div>
                <button id="reset">Reset</button>
                <button id="cancel">Cancel</button>
                <button id="addProduct">Add Product</button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
