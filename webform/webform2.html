<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Form 2</title>
    <link rel="stylesheet" href="../css/webform2.css">
    <link rel="icon" href="../images/favicon/favicon-16x16.png">
</head>
<body>

<div>
    <header>
        <label id="bannerText">MUM Golden Dome Market::: SRM System</label>

        <div class="bootNav">
            <a href="#">Products</a>
            <a href="#">Suppliers</a>
        </div>
        <label>Hello!</label>
        <button id="signoutBtn">Sign Out</button>
    </header>

    <div class="container">
        <h2>New Product Form</h2>

        <div id="grid-container">
            <div id="column1">
                <div>
                    <label>Product Number</label>
                    <input type="text" name="product_number">
                </div>

                <div>
                    <label>Name</label>
                    <input type="text" name="name">
                </div>

                <div>
                    <label>Unit Price</label>
                    <input type="number" name="unit_price">
                </div>
            </div>

            <div id="column2">
                <div>
                    <label>Quantity In Stock</label>
                    <input type="number" name="quantity">
                </div>

                <div>
                    <label>Supplier:</label>
                    <select>
                        <option>Select a supplier</option>
                    </select>
                </div>

                <div>
                    <label>Date Supplied</label>
                    <input type="date" name="date">
                    <span>Enter a valid date</span>
                </div>
            </div>
        </div>
        <div id="buttonsContainer">
            <button id="resetBtn">Reset</button>
            <button id="cancelBtn">Cancel</button>
            <button id="addProductBtn">Add Product</button>
        </div>
    </div>
</div>

</body>
</html>
