<!DOCTYPE html>
<html>

<head>
    <title>FP - Mocha & Chai</title>
    <meta charset="utf-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/3.5.0/chai.js"></script>
    <script>
        // initialize mocha
        mocha.setup('bdd');
        // chai has a lot of stuff, let's make assert global
        let assert = chai.assert;

    </script>

    <script>
        /* 4 Define a function sum() and a function multiply() that sums and multiplies (respectively) all the
         numbers in an array of numbers*/
        function sum(inputArray) {
            const reducer = (accumulator, curr) => accumulator + curr;
            return inputArray.reduce(reducer);
        }

        function multiply(inputArray) {
            const reducer = (accumulator, curr) => accumulator * curr;
            return inputArray.reduce(reducer);
        }

        /* 5 Define a function reverse() that computes the reversal of a string.*/
        function reverse(inputValue) {
            const reduce = (inputValue) => {
                return inputValue.split("").reduce((acc, curr) => curr + acc);
            }
            return reduce(inputValue);
        }

        /* 7 Write a function filterLongWords() that takes an array of words and an integer i and returns the array of words that are longer than i. */
        function filterLongWords(inputArray, i) {
            return inputArray.filter(value => value.length > i);
        }

    </script>
    <script>
        describe("sum", function () {
            it("takes an array of numbers, and returns the sum",
                function () {
                    assert.equal(10, sum([1, 2, 3, 4]));
                });
        });

        describe("multiply", function () {
            it("takes an array of numbers, and returns their product",
                function () {
                    assert.equal(24, multiply([1, 2, 3, 4]));
                });
        });

        describe("reverse", function () {
            it("computes the reversal of a string",
                function () {
                    assert.equal("adnana", reverse("ananda"));
                });
        });

        describe("filterLongWords", function () {
            it("takes an array of words and an integer i and returns the array of words that are longer than i",
                function () {
                    assert.equal(["Johnstone", "Ananda"].toString(), filterLongWords(["Johnstone", "Ananda", "Otoyo"], 5));
                });
        });

    </script>
</head>

<body>
<div id="mocha"></div>
<script>
    mocha.run();

</script>
</body>

</html>
