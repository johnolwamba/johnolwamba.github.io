<!DOCTYPE html>
<html lang="en">
<head>
    <title>Circle Screen</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="circlescreen.js"></script>
    <link href="circlescreen.css" rel="stylesheet">
</head>
<body>
<div id="circles">
</div>

<div id="container">
    <div class="form-input">
        <label for="widthInput">Width:</label>
        <input type="number" id="widthInput" min="1"/>
    </div>
    <div class="form-input">
        <label for="growAmount">Growth Amount:</label>
        <input type="number" id="growAmount" min="1"/>
    </div>
    <div class="form-input">
        <label for="growRate">Grow Rate:</label>
        <input type="number" id="growRate" min="0"/>
    </div>
    <div class="form-input">
        <label for="numberOfCircles">Number Circles:</label>
        <input id="numberOfCircles" type="number" min="1"/>
    </div>
    <div class="form-input">
        <button id="startButton" type="button">Start</button>
    </div>
</div>
</body>
</html>
