<!DOCTYPE html>
<html>
<head>
    <title>Text Decorator</title>
    <link rel="icon" href="../images/favicon/favicon-16x16.png">
    <link href="../css/decoratemytext.css" type="text/css" rel="stylesheet"/>

    <!--
    This is a widely-used JavaScript library named jQuery that has
    many useful functions which we need.
    Please don't remove this link or change its URL; leave it as-is!
    -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.2/jquery.min.js" type="text/javascript"></script>

    <!-- link to your script file here -->
    <script src="../js/decoratemytext.js" type="text/javascript"></script>
</head>

<body>
<h1>Text Decorator</h1>

<div>
    <img src="../images/decorated.gif" alt="very decorated!"/>
</div>

<!-- Your UI controls go here -->
    <div>
        <fieldset>
            <legend>Text</legend>
            <textarea id="inputTextArea" rows="4" cols="30">
        Sample Item 1
        Sample Item 2
      </textarea>
        </fieldset>
        <br/>
        <fieldset>
            <legend>Decoration</legend>
            <button id="decoButton">Bigger Decorations!</button>
            <br/>
            <input id="checkBox" type="checkbox"> Bling
        </fieldset>
    </div>

</body>
</html>
